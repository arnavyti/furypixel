<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FuryPixel Staff Application</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">
<h1>FuryPixel</h1>
<p>Staff Applications</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="forums.html">Forums</a>
<a href="staff.html">Staff</a>
</nav>

</header>

<section class="hero">

<div class="hero-content">

<h2>Join Our Staff Team</h2>

<p>
We're always looking for dedicated and friendly community members.
Fill out the application form below to apply.
</p>

</div>

</section>

<section class="features">

<div class="card">

<h3>Application Form</h3>

<form>

<input
type="text"
placeholder="Minecraft Username"
required
style="width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;">

<input
type="email"
placeholder="Email Address"
required
style="width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;">

<input
type="text"
placeholder="Discord Username"
required
style="width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;">

<textarea
placeholder="Why should we choose you?"
rows="6"
required
style="width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;"></textarea>

<button
type="submit"
style="padding:15px 35px;border:none;border-radius:10px;background:#6d3cff;color:white;font-size:17px;cursor:pointer;">
Submit Application
</button>

</form>

</div>

</section>

<footer>

<h2>FuryPixel Network</h2>

<p>© 2026 FuryPixel. All Rights Reserved.</p>

</footer>

<script src="script.js"></script>

</body>
</html>
